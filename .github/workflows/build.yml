name: Build Multi-Platform

on:
  push:
    branches: [ "master" ]
    paths:
      - "mochatools.py"
      - "requirements.txt"
      - "builditems/debian_ubuntu/VERSION"
      - ".github/workflows/build.yml"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Cache pip packages to prevent timeouts
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Read version file only for Linux builds
      - name: Read version file (Linux only)
        if: matrix.os == 'ubuntu-latest'
        id: version
        run: echo "VERSION=$(cat builditems/debian_ubuntu/VERSION)" >> $GITHUB_ENV

      - name: Show version (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: echo "Building Linux version $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            pyinstaller --onefile --noconsole \
              --version-file ./builditems/windows/version.txt \
              --icon=./builditems/windows/icon.ico \
              --name "Mocha Tools" \
              mochatools.py

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            pyinstaller --noconsole --windowed \
              --name "Mocha Tools" \
              --osx-bundle-identifier com.nxllxvxxd2.mochatools \
              --name "Mocha Tools" \
              mochatools.py

            # Copy Info.plist manually after build
            cp ./builditems/macos/Info.plist "dist/Mocha Tools.app/Contents/Info.plist"

          else
            pyinstaller --onefile --noconsole \
              --icon=./builditems/debian_ubuntu/icon.png \
              --name "Mocha Tools" \
              mochatools.py
          fi

      - name: Build .deb package (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install --no-document fpm

          mkdir -p deb_build/usr/bin
          cp dist/mochatools deb_build/usr/bin/mochatools
          chmod 755 deb_build/usr/bin/mochatools

          fpm -s dir -t deb \
            -n mocha-tools \
            -v $VERSION \
            --description "Mocha Tools" \
            deb_build/=/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build${{ env.VERSION && format('-v{0}', env.VERSION) }}
          path: |
            dist/
            *.deb
