name: Build Multi-Platform

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            pyinstaller --onefile --noconsole --icon=icon.ico mochatools.py
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            pyinstaller --onefile --noconsole --windowed --icon=icon.icns mochatools.py
          else
            pyinstaller --onefile --noconsole --icon=icon.png mochatools.py
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: dist/
